version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: guidance_db
    environment:
      POSTGRES_DB: guidance_db
      POSTGRES_USER: guidance_user
      POSTGRES_PASSWORD: guidance_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guidance_user -d guidance_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: guidance_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://guidance_user:guidance_pass@db:5432/guidance_db
      DASH_HOST: 0.0.0.0
      DASH_PORT: 8050
      DASH_DEBUG: "false"
    ports:
      - "8050:8050"
    volumes:
      - .:/app
    command: >
      sh -c "alembic upgrade head &&
             python -m src.seed_data &&
             python -m src.pipeline &&
             python -m src.dashboard.app"

volumes:
  postgres_data:
